---
version: "0.1"
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: linux

runtime: 
  language: ruby
  version: "3.1.2"

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 2

pre:
  - bundle config set --local deployment 'true'
  - bundle install

cacheKey: '{{ checksum "Gemfile.lock" }}'
cacheDirectories:
  - /vendor

env:
   CONFIG_NAME: "linux"

testDiscovery:
  type: raw
  mode: remote
  command: grep -nri -E 'it ".*." do' spec/*.rb | awk '{print$1}' | sed 's/\(.*\):/\1 /'

testRunnerCommand: bundle exec rspec "$test" --format html --out rspec_results.html

mergeArtifacts: true
uploadArtefacts:
 - name: report
   path:
     - rspec_results.html

report: true
partialReports:
 location: rspec_results.html
 type: html

jobLabel: [selenium-Rspec, linux, autosplit]