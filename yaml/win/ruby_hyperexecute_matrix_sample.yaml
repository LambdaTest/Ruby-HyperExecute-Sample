---
version: "0.1"
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: ${matrix.os}

retryOnFailure: true
maxRetries: 1
concurrency: 2
parallel: 1

matrix:
  os: [win]
  files: ["spec/login_test.rb", "spec/todo_test.rb"]

pre:
  - bundle config set --local deployment 'true'
  - bundle install

cacheKey: '{{ checksum "Gemfile.lock" }}'
cacheDirectories:
  - /vendor

env:
   CONFIG_NAME: "win"

testSuites:
  - bundle exec rspec "$files" --format html --out rspec_results.html

mergeArtifacts: true
uploadArtefacts:
 - name: report
   path:
     - rspec_results.html

report: true
partialReports:
 location: rspec_results.html
 type: html

jobLabel: [selenium-Rspec, win, matrix]